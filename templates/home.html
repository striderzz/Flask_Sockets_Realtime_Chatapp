{% extends 'base.html' %}

{% block content %}
<form method="post" class="buttons">
  <h3>Enter The Chat Room</h3>

  <div class="form-group">
    <label for="name">Name:</label>
    <input
      id="name"
      type="text"
      placeholder="Pick a name!"
      name="name"
      value="{{ name }}"
    />
  </div>

  <div class="join">
    <input
      type="text"
      placeholder="Room Code"
      name="code"
      value="{{ code }}"
    />
    <button type="submit" name="join">Join</button>
  </div>

  <button type="submit" name="create" class="create-btn">
    Create a Room
  </button>

  {% if error %}
  <p class="error">{{ error }}</p>
  {% endif %}
</form>
{% endblock %}
